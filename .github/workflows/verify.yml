name: Verify

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node 20 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:platform
      - run: npm run benchmark:ci
      - run: git diff --check
      - run: npm audit --omit=dev
      - run: npm audit
